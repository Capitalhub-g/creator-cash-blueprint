<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Creator Cash Blueprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Onest:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      position: relative;
      overflow: hidden;
    }
    .auth-orb {
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,245,196,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .auth-box {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 36px;
    }
    .auth-logo .logo-mark { color: var(--neon); font-size: 22px; text-shadow: 0 0 16px var(--neon); }
    .auth-logo strong { color: var(--neon); }
    .auth-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .auth-tabs-row {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab-btn {
      flex: 1;
      padding: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--white-30);
      font-family: var(--f-body);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: var(--transition);
      text-align: center;
    }
    .auth-tab-btn.active {
      color: var(--neon);
      border-bottom-color: var(--neon);
      background: rgba(0,245,196,0.03);
    }
    .auth-tab-btn:hover:not(.active) { color: var(--white-50); }
    .auth-form-wrap { padding: 32px; }
    .auth-form-wrap .mfield { margin-bottom: 16px; }
    .auth-form-wrap .mfield label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--white-30);
      margin-bottom: 6px;
      font-family: var(--f-mono);
    }
    .auth-form-wrap .mfield input {
      width: 100%;
      padding: 13px 14px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 14px;
      font-family: var(--f-body);
      outline: none;
      transition: var(--transition);
    }
    .auth-form-wrap .mfield input:focus {
      border-color: rgba(0,245,196,0.4);
      background: rgba(0,245,196,0.03);
    }
    .auth-form-wrap .mfield input::placeholder { color: rgba(255,255,255,0.2); }
    .forgot-row { text-align: right; margin-bottom: 20px; margin-top: -8px; }
    .forgot-row a { font-size: 12px; color: var(--white-30); transition: var(--transition); }
    .forgot-row a:hover { color: var(--neon); }
    .auth-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-divider span { font-size: 11px; color: var(--white-30); font-family: var(--f-mono); }
    .btn-google-auth {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white-80);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--f-body);
      transition: var(--transition);
    }
    .btn-google-auth:hover { background: var(--surface-hover); border-color: var(--border-bright); }
    .auth-terms {
      text-align: center;
      font-size: 11px;
      color: var(--white-30);
      margin-top: 16px;
      line-height: 1.6;
    }
    .auth-terms a { color: var(--neon); }
    .auth-back { text-align: center; margin-top: 20px; font-size: 13px; color: var(--white-30); }
    .auth-back a { color: var(--white-80); font-weight: 600; transition: var(--transition); }
    .auth-back a:hover { color: var(--neon); }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <nav id="nav" class="scrolled">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">✦</span>
        <span>Creator<strong>Cash</strong> Blueprint</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">← Back to Home</a></li>
      </ul>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-orb"></div>
    <div class="auth-box">
      <div class="auth-logo">
        <span class="logo-mark">✦</span>
        <span>Creator<strong>Cash</strong> Blueprint</span>
      </div>

      <div class="auth-card">
        <div class="auth-tabs-row">
          <button class="auth-tab-btn active" onclick="switchAuthTab('login', this)">Sign In</button>
          <button class="auth-tab-btn" onclick="switchAuthTab('register', this)">Create Account</button>
        </div>

        <!-- Login -->
        <div id="loginPanel" class="auth-form-wrap panel active">
          <div class="mfield">
            <label>Email</label>
            <input type="email" placeholder="you@example.com" />
          </div>
          <div class="mfield">
            <label>Password</label>
            <input type="password" placeholder="Your password" />
          </div>
          <div class="forgot-row"><a href="#">Forgot password?</a></div>
          <button class="btn-neon" style="width:100%;justify-content:center;" onclick="doLogin()">Sign In →</button>
          <div class="auth-divider"><span>or</span></div>
          <button class="btn-google-auth">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
          </button>
          <p class="auth-terms">By signing in you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.</p>
        </div>

        <!-- Register -->
        <div id="registerPanel" class="auth-form-wrap panel">
          <div class="mfield">
            <label>Full Name</label>
            <input type="text" placeholder="Your name" />
          </div>
          <div class="mfield">
            <label>Email</label>
            <input type="email" placeholder="you@example.com" />
          </div>
          <div class="mfield">
            <label>Password</label>
            <input type="password" placeholder="Create a strong password" />
          </div>
          <button class="btn-neon" style="width:100%;justify-content:center;margin-top:4px;" onclick="doRegister()">Create Account →</button>
          <div class="auth-divider"><span>or</span></div>
          <button class="btn-google-auth">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </button>
          <p class="auth-terms">By registering you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.</p>
        </div>
      </div>

      <div class="auth-back"><a href="index.html">← Back to Creator Cash Blueprint</a></div>
    </div>
  </div>

  <script>
    function switchAuthTab(panel, btn) {
      document.querySelectorAll('.auth-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(panel + 'Panel').classList.add('active');
    }
    function doLogin() {
      const btn = event.currentTarget;
      btn.innerHTML = 'Signing in...';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'download.html'; }, 1200);
    }
    function doRegister() {
      const btn = event.currentTarget;
      btn.innerHTML = 'Creating account...';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'download.html'; }, 1200);
    }
    if (window.location.hash === '#register') {
      const btn = document.querySelectorAll('.auth-tab-btn')[1];
      switchAuthTab('register', btn);
    }
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 30));
  </script>
</body>
</html>
